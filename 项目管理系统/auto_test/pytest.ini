[pytest]
# 测试文件发现规则
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出控制
addopts =
    -v
    --tb=short
    --color=yes
    -p no:warnings

# 标记注册
markers =
    smoke: 冒烟测试
    regression: 回归测试
    performance: 性能测试
    security: 安全测试
    boundary: 边界值测试
